<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="javascript:void(0)" onclick="window.scrollTo({top:0,behavior:'smooth'})">Homepage</a></li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item"><a href="javascript:void(0)" data-scroll="{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <script>
        document.querySelectorAll('[data-scroll]').forEach(function(a){
          a.addEventListener('click', function(e){
            e.preventDefault();
            var target = this.getAttribute('data-scroll').replace('/','');
            if(target === '#') { window.scrollTo({top:0,behavior:'smooth'}); return; }
            var el = document.querySelector(target);
            if(el) el.scrollIntoView({behavior:'smooth'});
          });
        });
        </script>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme">
      <i class="fas fa-sun theme-toggle__icon--sun"></i>
      <i class="fas fa-moon theme-toggle__icon--moon"></i>
    </button>
  </div>
</div>
<script>
(function() {
  var toggle = document.getElementById('theme-toggle');
  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });
})();
</script>
